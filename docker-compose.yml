# ============================================================================
# OSIRIS-Lab v2 — Docker Compose Optimisé
# Principal DevSecOps Architect
# ============================================================================

version: '3.8'

# ─── Networks ────────────────────────────────────────────────────────────────
networks:
  osiris-frontend:
    driver: bridge
    ipam:
      config:
        - subnet: 10.0.1.0/24
  osiris-backend:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 10.0.2.0/24

# ─── Volumes ─────────────────────────────────────────────────────────────────
volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  nats-data:
    driver: local
  grafana-data:
    driver: local
  loki-data:
    driver: local
  alloy-data:
    driver: local
  vault-data:
    driver: local

# ─── Services ────────────────────────────────────────────────────────────────
services:
  # ─── Frontend ─────────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: osiris-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost:3000
    networks:
      - osiris-frontend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  # ─── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine@sha256:3e7b8f9c6d5e4f3a2b1c0d9e8f7a6b5c4d3e2f1a0b9c8d7e6f5a4b3c2d1e0f9
    container_name: osiris-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: osiris
      POSTGRES_USER: osiris
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./services/notification-service/src/infrastructure/database/migrations:/docker-entrypoint-initdb.d
    networks:
      - osiris-backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U osiris -d osiris"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

  # ─── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine@sha256:a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b2
    container_name: osiris-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - osiris-backend
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  # ─── NATS JetStream ────────────────────────────────────────────────────────
  nats:
    image: nats:2-alpine@sha256:b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b2c3
    container_name: osiris-nats
    restart: unless-stopped
    command: -js -m 8222
    volumes:
      - nats-data:/data
    networks:
      - osiris-backend
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "4222"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M

  # ─── Notification Service ──────────────────────────────────────────────────
  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    container_name: osiris-notification-service
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://osiris:${POSTGRES_PASSWORD:-changeme}@postgres:5432/osiris
      - REDIS_URL=redis://redis:6379
      - NATS_URL=nats://nats:4222
    networks:
      - osiris-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  # ─── Workflow Designer Service ─────────────────────────────────────────────
  workflow-designer-service:
    build:
      context: .
      dockerfile: services/workflow-designer-service/Dockerfile
    container_name: osiris-workflow-designer
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://osiris:${POSTGRES_PASSWORD:-changeme}@postgres:5432/osiris
      - NATS_URL=nats://nats:4222
    networks:
      - osiris-backend
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  # ─── Grafana Alloy (Observability) ─────────────────────────────────────────
  alloy:
    image: grafana/alloy:latest
    container_name: osiris-alloy
    restart: unless-stopped
    command: run /etc/alloy/config.alloy --storage.path=/var/lib/alloy/data
    volumes:
      - alloy-data:/var/lib/alloy/data
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "1234:1234"   # Alloy UI
    networks:
      - osiris-backend
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  # ─── Loki (Logs) ───────────────────────────────────────────────────────────
  loki:
    image: grafana/loki:3.0.0
    container_name: osiris-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki-data:/loki
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml:ro
    networks:
      - osiris-backend
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3100/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  # ─── Grafana (Visualization) ───────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.0.0
    container_name: osiris-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3001
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3001:3000"
    networks:
      - osiris-frontend
      - osiris-backend
    depends_on:
      loki:
        condition: service_healthy
      alloy:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  # ─── HashiCorp Vault (Secrets Management) ──────────────────────────────────
  vault:
    image: vault:1.15.0
    container_name: osiris-vault
    restart: unless-stopped
    environment:
      - VAULT_DEV_ROOT_TOKEN_ID=${VAULT_ROOT_TOKEN:-root}
      - VAULT_DEV_LISTEN_ADDRESS=0.0.0.0:8200
    volumes:
      - vault-data:/vault/data
    cap_add:
      - IPC_LOCK
    ports:
      - "8200:8200"
    networks:
      - osiris-backend
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M

# ─── Global Configuration ────────────────────────────────────────────────────
x-logging:
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"
    compress: "true"