name: osiris

x-common-logging: &common-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-node-hardening: &node-hardening
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL

x-node-runtime: &node-runtime
  init: true
  restart: unless-stopped
  stop_grace_period: 30s
  tmpfs:
    - /tmp:size=64m,noexec,nosuid,nodev
  logging: *common-logging
  <<: *node-hardening

x-module-runtime: &module-runtime
  <<: *node-runtime
  image: "${OSIRIS_MODULE_IMAGE:-osiris-module-runtime:latest}"
  build:
    context: ./modules
    dockerfile: Dockerfile
  command: ["node", "module-worker.js"]
  read_only: true
  depends_on:
    osiris-redis:
      condition: service_healthy
  environment:
    REDIS_URL: "redis://osiris-redis:6379"
    MODULE_RUNTIME_CONFIG_URL: "http://osiris:3000/api/modules/{id}"
    MODULE_STATUS_TTL_SECONDS: "${MODULE_STATUS_TTL_SECONDS:-120}"
    MODULE_PROBE_TIMEOUT_MS: "${MODULE_PROBE_TIMEOUT_MS:-5000}"
  mem_limit: "${MODULE_MEM_LIMIT:-256m}"
  cpus: "${MODULE_CPUS:-0.50}"
  pids_limit: 128
  networks:
    - backend
    - data
    - egress

services:
  osiris-cache:
    image: "${NGINX_IMAGE:-nginx:stable-alpine}"
    command:
      - /bin/sh
      - -c
      - >-
        mkdir -p /var/cache/nginx/tiles /var/cache/nginx/app &&
        chown -R nginx:nginx /var/cache/nginx &&
        exec nginx -g 'daemon off;'
    init: true
    restart: unless-stopped
    depends_on:
      osiris:
        condition: service_healthy
    ports:
      - "${OSIRIS_BIND_ADDR:-127.0.0.1}:${OSIRIS_PORT:-3100}:8080"
    volumes:
      - type: bind
        source: ./nginx/nginx.conf
        target: /etc/nginx/nginx.conf
        read_only: true
      - type: volume
        source: nginx-cache
        target: /var/cache/nginx
    tmpfs:
      - /tmp:size=64m,noexec,nosuid,nodev
      - /var/run:size=16m,noexec,nosuid,nodev
    mem_limit: "${NGINX_MEM_LIMIT:-256m}"
    cpus: "${NGINX_CPUS:-0.50}"
    pids_limit: 128
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/api/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    networks:
      - edge
      - backend
    logging: *common-logging

  osiris:
    <<: *node-runtime
    image: "${OSIRIS_IMAGE:-ghcr.io/aiacos/osiris:latest}"
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      osiris-redis:
        condition: service_healthy
      osiris-intel:
        condition: service_healthy
      osiris-tracking:
        condition: service_healthy
      osiris-core-brain:
        condition: service_healthy
    expose:
      - "3000"
    environment:
      NODE_ENV: "production"
      NODE_OPTIONS: "--dns-result-order=ipv4first --network-family-autoselection-attempt-timeout=2000"
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      TRUST_PROXY_HEADERS: "${TRUST_PROXY_HEADERS:-true}"
      REDIS_URL: "redis://osiris-redis:6379"
      INTEL_URL: "http://osiris-intel:4000"
      CORE_BRAIN_URL: "http://osiris-core-brain:4400"
      TRACKING_URL: "http://osiris-tracking:4201"
      ADSB_URL: "http://osiris-tracking:4201/flights"
      AIS_URL: "http://osiris-tracking:4201/maritime"
      EARTHQUAKE_URL: "http://osiris-earthquakes:4103"
      WILDFIRE_URL: "http://osiris-wildfires:4104"
      SATELLITE_URL: "http://osiris-satellites:4105"
      SHODAN_URL: "http://osiris-shodan:4106"
      HEALTH_URL: "http://osiris-health:4190"
      MODULE_ADSB_ENABLED: "${MODULE_ADSB_ENABLED:-false}"
      MODULE_AIS_ENABLED: "${MODULE_AIS_ENABLED:-false}"
      MODULE_EARTHQUAKES_ENABLED: "${MODULE_EARTHQUAKES_ENABLED:-false}"
      MODULE_WILDFIRES_ENABLED: "${MODULE_WILDFIRES_ENABLED:-false}"
      MODULE_SATELLITES_ENABLED: "${MODULE_SATELLITES_ENABLED:-false}"
      MODULE_SHODAN_ENABLED: "${MODULE_SHODAN_ENABLED:-false}"
      MODULE_INTELLIGENCE_ENABLED: "${MODULE_INTELLIGENCE_ENABLED:-true}"
      MODULE_CCTV_ENABLED: "${MODULE_CCTV_ENABLED:-false}"
      MODULE_NEWS_ENABLED: "${MODULE_NEWS_ENABLED:-true}"
      MODULE_WEATHER_ENABLED: "${MODULE_WEATHER_ENABLED:-true}"
      MODULE_CYBER_ENABLED: "${MODULE_CYBER_ENABLED:-true}"
      OSIRIS_MODULES_JSON: "${OSIRIS_MODULES_JSON:-}"
      OSIRIS_MODULE_CONFIG: "${OSIRIS_MODULE_CONFIG:-}"
      OSIRIS_MODULE_ADMIN_TOKEN: "${OSIRIS_MODULE_ADMIN_TOKEN:-}"
      OSIRIS_MODULE_ALLOW_UNAUTHENTICATED_TOGGLES: "${OSIRIS_MODULE_ALLOW_UNAUTHENTICATED_TOGGLES:-false}"
      SCANNER_URL: "${SCANNER_URL:-}"
      SCANNER_KEY: "${SCANNER_KEY:-}"
      SDK_INGEST_KEY: "${SDK_INGEST_KEY:-}"
      GITHUB_WEBHOOK_SECRET: "${GITHUB_WEBHOOK_SECRET:-}"
      UMAMI_WEBSITE_ID: "${UMAMI_WEBSITE_ID:-}"
      OSIRIS_TELEGRAM_CHANNELS: "${OSIRIS_TELEGRAM_CHANNELS:-}"
      OSIRIS_ENABLE_TELEGRAM_SCRAPE: "${OSIRIS_ENABLE_TELEGRAM_SCRAPE:-false}"
      FIRMS_API_KEY: "${FIRMS_API_KEY:-}"
      AIS_API_KEY: "${AIS_API_KEY:-}"
      VESSEL_API_KEY: "${VESSEL_API_KEY:-}"
      VESSEL_API_URL: "${VESSEL_API_URL:-}"
      OPENSKY_CLIENT_ID: "${OPENSKY_CLIENT_ID:-}"
      OPENSKY_CLIENT_SECRET: "${OPENSKY_CLIENT_SECRET:-}"
      N2YO_API_KEY: "${N2YO_API_KEY:-}"
      SHODAN_API_KEY: "${SHODAN_API_KEY:-}"
      GEMINI_API_KEY_1: "${GEMINI_API_KEY_1:-}"
      GEMINI_API_KEY_2: "${GEMINI_API_KEY_2:-}"
      GEMINI_API_KEY_3: "${GEMINI_API_KEY_3:-}"
      GEMINI_API_KEY_4: "${GEMINI_API_KEY_4:-}"
      GEMINI_API_KEY_5: "${GEMINI_API_KEY_5:-}"
      GEMINI_API_KEY_6: "${GEMINI_API_KEY_6:-}"
      GEMINI_API_KEY_7: "${GEMINI_API_KEY_7:-}"
      GEMINI_API_KEY_8: "${GEMINI_API_KEY_8:-}"
    volumes:
      - type: volume
        source: next-cache
        target: /app/.next/cache
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          node -e "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    mem_limit: "${OSIRIS_MEM_LIMIT:-1024m}"
    cpus: "${OSIRIS_CPUS:-1.50}"
    pids_limit: 512
    networks:
      - edge
      - backend
      - data
      - egress

  osiris-intel:
    <<: *node-runtime
    image: "${OSIRIS_INTEL_IMAGE:-osiris-intel:latest}"
    build:
      context: ./intel
      dockerfile: Dockerfile
    depends_on:
      osiris-redis:
        condition: service_healthy
    expose:
      - "4000"
    environment:
      NODE_ENV: "production"
      INTEL_PORT: "4000"
      REDIS_URL: "redis://osiris-redis:6379"
      MODULE_INTELLIGENCE_ENABLED: "${MODULE_INTELLIGENCE_ENABLED:-true}"
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          node -e "fetch('http://127.0.0.1:4000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    mem_limit: "${INTEL_MEM_LIMIT:-768m}"
    cpus: "${INTEL_CPUS:-1.00}"
    pids_limit: 384
    networks:
      backend:
        aliases:
          - osiris-intelligence
      data:
      egress:

  osiris-tracking:
    <<: *node-runtime
    image: "${OSIRIS_TRACKING_IMAGE:-osiris-tracking-service:latest}"
    build:
      context: ./services/tracking-service
      dockerfile: Dockerfile
    depends_on:
      osiris-redis:
        condition: service_healthy
    expose:
      - "4201"
    environment:
      NODE_ENV: "production"
      PORT: "4201"
      REDIS_URL: "redis://osiris-redis:6379"
      REDIS_ENABLED: "${TRACKING_REDIS_ENABLED:-true}"
      TRACK_STREAM_KEY: "${TRACK_STREAM_KEY:-osiris:streams:tracks.normalized}"
      TRACK_UPDATES_CHANNEL: "${TRACK_UPDATES_CHANNEL:-osiris:tracks:updates}"
      EVENT_STREAM_ENABLED: "${EVENT_STREAM_ENABLED:-true}"
      EVENT_STREAM_KEY: "${EVENT_STREAM_KEY:-osiris.stream}"
      EVENT_STREAM_MAXLEN: "${EVENT_STREAM_MAXLEN:-0}"
      ADSB_ENABLED: "${MODULE_ADSB_ENABLED:-false}"
      ADSB_URL: "${ADSB_PROVIDER_URL:-https://opensky-network.org/api/states/all}"
      ADSB_FALLBACK_URLS: "${ADSB_FALLBACK_URLS:-}"
      ADSB_POLL_SECONDS: "${ADSB_REFRESH_SECONDS:-15}"
      ADSB_AUTH_MODE: "${ADSB_AUTH_MODE:-none}"
      OPENSKY_AUTH_MODE: "${OPENSKY_AUTH_MODE:-none}"
      OPENSKY_CLIENT_ID: "${OPENSKY_CLIENT_ID:-}"
      OPENSKY_CLIENT_SECRET: "${OPENSKY_CLIENT_SECRET:-}"
      OPENSKY_USERNAME: "${OPENSKY_USERNAME:-}"
      OPENSKY_PASSWORD: "${OPENSKY_PASSWORD:-}"
      AIS_ENABLED: "${MODULE_AIS_ENABLED:-false}"
      AIS_URL: "${AIS_PROVIDER_URL:-}"
      AIS_WS_URL: "${AIS_WS_URL:-}"
      AIS_FALLBACK_URLS: "${AIS_FALLBACK_URLS:-}"
      AIS_POLL_SECONDS: "${AIS_REFRESH_SECONDS:-30}"
      AIS_AUTH_MODE: "${AIS_AUTH_MODE:-bearer}"
      AIS_API_KEY: "${AIS_API_KEY:-}"
      VESSEL_AUTH_MODE: "${VESSEL_AUTH_MODE:-bearer}"
      VESSEL_API_KEY: "${VESSEL_API_KEY:-}"
      VESSEL_API_URL: "${VESSEL_API_URL:-}"
      AIRCRAFT_STALE_AFTER_SECONDS: "${AIRCRAFT_STALE_AFTER_SECONDS:-120}"
      VESSEL_STALE_AFTER_SECONDS: "${VESSEL_STALE_AFTER_SECONDS:-600}"
      PROVIDER_TIMEOUT_MS: "${TRACKING_PROVIDER_TIMEOUT_MS:-8000}"
      PROVIDER_RETRY_COUNT: "${TRACKING_PROVIDER_RETRY_COUNT:-2}"
      TRACK_INGEST_TOKEN: "${TRACK_INGEST_TOKEN:-}"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:4201/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    mem_limit: "${TRACKING_MEM_LIMIT:-512m}"
    cpus: "${TRACKING_CPUS:-1.00}"
    pids_limit: 256
    networks:
      - backend
      - data
      - egress

  osiris-sensor-opensky:
    <<: *node-runtime
    image: "${OSIRIS_OPENSKY_SENSOR_IMAGE:-osiris-sensor-opensky:latest}"
    build:
      context: ./services/sensors
      dockerfile: opensky/Dockerfile
    depends_on:
      osiris-redis:
        condition: service_healthy
    expose:
      - "4701"
    environment:
      NODE_ENV: "production"
      PORT: "4701"
      REDIS_URL: "redis://osiris-redis:6379"
      EVENT_STREAM_KEY: "${EVENT_STREAM_KEY:-osiris.stream}"
      EVENT_STREAM_MAXLEN: "${EVENT_STREAM_MAXLEN:-0}"
      OPENSKY_ENABLED: "${OPENSKY_SENSOR_ENABLED:-false}"
      OPENSKY_API_URL: "${OPENSKY_API_URL:-https://opensky-network.org/api/states/all}"
      OPENSKY_AUTH_URL: "${OPENSKY_AUTH_URL:-https://auth.opensky-network.org/auth/realms/opensky-network/protocol/openid-connect/token}"
      OPENSKY_CLIENT_ID: "${OPENSKY_CLIENT_ID:-}"
      OPENSKY_CLIENT_SECRET: "${OPENSKY_CLIENT_SECRET:-}"
      OPENSKY_BBOX: "${OPENSKY_BBOX:-}"
      OPENSKY_ICAO24: "${OPENSKY_ICAO24:-}"
      OPENSKY_POLL_SECONDS: "${OPENSKY_POLL_SECONDS:-}"
      OPENSKY_EXTENDED: "${OPENSKY_EXTENDED:-true}"
      OPENSKY_INCLUDE_ON_GROUND: "${OPENSKY_INCLUDE_ON_GROUND:-true}"
      OPENSKY_MIN_ALTITUDE_M: "${OPENSKY_MIN_ALTITUDE_M:-}"
      OPENSKY_MAX_ALTITUDE_M: "${OPENSKY_MAX_ALTITUDE_M:-}"
      OPENSKY_MIN_VELOCITY_MPS: "${OPENSKY_MIN_VELOCITY_MPS:-}"
      OPENSKY_REQUEST_TIMEOUT_MS: "${OPENSKY_REQUEST_TIMEOUT_MS:-10000}"
      OPENSKY_RETRY_COUNT: "${OPENSKY_RETRY_COUNT:-2}"
      OPENSKY_RETRY_BASE_MS: "${OPENSKY_RETRY_BASE_MS:-1000}"
      OPENSKY_RETRY_MAX_MS: "${OPENSKY_RETRY_MAX_MS:-60000}"
      OPENSKY_MIN_REQUEST_SPACING_MS: "${OPENSKY_MIN_REQUEST_SPACING_MS:-10000}"
      OPENSKY_MAX_BATCH_SIZE: "${OPENSKY_MAX_BATCH_SIZE:-10000}"
      SENSOR_MAX_STREAM_LENGTH: "${SENSOR_MAX_STREAM_LENGTH:-500000}"
      SENSOR_BACKPRESSURE_PAUSE_MS: "${SENSOR_BACKPRESSURE_PAUSE_MS:-5000}"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:4701/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    mem_limit: "${OPENSKY_SENSOR_MEM_LIMIT:-256m}"
    cpus: "${OPENSKY_SENSOR_CPUS:-0.50}"
    pids_limit: 128
    networks:
      - backend
      - data
      - egress

  osiris-event-bus:
    <<: *node-runtime
    image: "${OSIRIS_EVENT_BUS_IMAGE:-osiris-event-bus:latest}"
    build:
      context: ./services/event-bus
      dockerfile: Dockerfile
    depends_on:
      osiris-redis:
        condition: service_healthy
    expose:
      - "4300"
    environment:
      NODE_ENV: "production"
      PORT: "4300"
      REDIS_URL: "redis://osiris-redis:6379"
      EVENT_BUS_MODE: "${EVENT_BUS_MODE:-all}"
      EVENT_STREAM_KEY: "${EVENT_STREAM_KEY:-osiris.stream}"
      EVENT_DLQ_STREAM_KEY: "${EVENT_DLQ_STREAM_KEY:-osiris.stream.dlq}"
      EVENT_PROCESSED_STREAM_KEY: "${EVENT_PROCESSED_STREAM_KEY:-osiris.stream.processed}"
      EVENT_CONSUMER_GROUP: "${EVENT_CONSUMER_GROUP:-osiris-intelligence}"
      EVENT_CONSUMER_NAME: "${EVENT_CONSUMER_NAME:-event-bus-1}"
      EVENT_STREAM_MAXLEN: "${EVENT_STREAM_MAXLEN:-0}"
      EVENT_STREAM_BACKPRESSURE_LENGTH: "${EVENT_STREAM_BACKPRESSURE_LENGTH:-500000}"
      EVENT_STREAM_BACKPRESSURE_PENDING: "${EVENT_STREAM_BACKPRESSURE_PENDING:-50000}"
      EVENT_CONSUMER_MAX_RETRIES: "${EVENT_CONSUMER_MAX_RETRIES:-5}"
      EVENT_WEATHER_ENABLED: "${MODULE_WEATHER_ENABLED:-false}"
      EVENT_EARTHQUAKES_ENABLED: "${MODULE_EARTHQUAKES_ENABLED:-false}"
      EVENT_WILDFIRES_ENABLED: "${MODULE_WILDFIRES_ENABLED:-false}"
      WEATHER_FEED_URL: "${WEATHER_FEED_URL:-https://api.weather.gov/alerts/active}"
      QUAKE_FEED_URL: "${QUAKE_FEED_URL:-https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/all_hour.geojson}"
      WILDFIRE_FEED_URL: "${WILDFIRE_FEED_URL:-https://eonet.gsfc.nasa.gov/api/v3/events?category=wildfires&status=open&limit=100}"
      WEATHER_POLL_SECONDS: "${WEATHER_POLL_SECONDS:-120}"
      QUAKE_POLL_SECONDS: "${QUAKE_POLL_SECONDS:-60}"
      WILDFIRE_POLL_SECONDS: "${WILDFIRE_POLL_SECONDS:-300}"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:4300/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    mem_limit: "${EVENT_BUS_MEM_LIMIT:-512m}"
    cpus: "${EVENT_BUS_CPUS:-1.00}"
    pids_limit: 256
    networks:
      - backend
      - data
      - egress

  osiris-brain:
    <<: *node-runtime
    image: "${OSIRIS_BRAIN_IMAGE:-osiris-brain:latest}"
    build:
      context: ./services/osiris-brain
      dockerfile: Dockerfile
    depends_on:
      osiris-redis:
        condition: service_healthy
    expose:
      - "4500"
    environment:
      NODE_ENV: "production"
      PORT: "4500"
      REDIS_URL: "redis://osiris-redis:6379"
      SERVICE_NAME: "osiris-brain"
      OSIRIS_BRAIN_ENABLED: "${OSIRIS_BRAIN_ENABLED:-true}"
      OSIRIS_BRAIN_STREAM_KEY: "${EVENT_STREAM_KEY:-osiris.stream}"
      OSIRIS_BRAIN_STREAM_MAXLEN: "${EVENT_STREAM_MAXLEN:-0}"
      OSIRIS_BRAIN_FEEDS_JSON: "${OSIRIS_BRAIN_FEEDS_JSON:-}"
      OSIRIS_BRAIN_FEEDS: "${OSIRIS_BRAIN_FEEDS:-}"
      OSIRIS_BRAIN_TRACKING_URL: "${OSIRIS_BRAIN_TRACKING_URL:-http://osiris-tracking:4201/tracks?limit=10000&stale=false}"
      OSIRIS_BRAIN_EARTHQUAKES_URL: "${OSIRIS_BRAIN_EARTHQUAKES_URL:-http://osiris:3000/api/earthquakes}"
      OSIRIS_BRAIN_WILDFIRES_URL: "${OSIRIS_BRAIN_WILDFIRES_URL:-http://osiris:3000/api/fires}"
      OSIRIS_BRAIN_WEATHER_URL: "${OSIRIS_BRAIN_WEATHER_URL:-http://osiris:3000/api/weather}"
      OSIRIS_BRAIN_TRACKING_POLL_SECONDS: "${OSIRIS_BRAIN_TRACKING_POLL_SECONDS:-15}"
      OSIRIS_BRAIN_EARTHQUAKES_POLL_SECONDS: "${OSIRIS_BRAIN_EARTHQUAKES_POLL_SECONDS:-60}"
      OSIRIS_BRAIN_WILDFIRES_POLL_SECONDS: "${OSIRIS_BRAIN_WILDFIRES_POLL_SECONDS:-300}"
      OSIRIS_BRAIN_WEATHER_POLL_SECONDS: "${OSIRIS_BRAIN_WEATHER_POLL_SECONDS:-120}"
      OSIRIS_BRAIN_REQUEST_TIMEOUT_MS: "${OSIRIS_BRAIN_REQUEST_TIMEOUT_MS:-8000}"
      OSIRIS_BRAIN_MAX_EVENTS_PER_POLL: "${OSIRIS_BRAIN_MAX_EVENTS_PER_POLL:-10000}"
      OSIRIS_BRAIN_DEDUPE_TTL_MS: "${OSIRIS_BRAIN_DEDUPE_TTL_MS:-900000}"
      OSIRIS_BRAIN_BACKPRESSURE_LENGTH: "${OSIRIS_BRAIN_BACKPRESSURE_LENGTH:-500000}"
      OSIRIS_BRAIN_WS_SNAPSHOT_MAX: "${OSIRIS_BRAIN_WS_SNAPSHOT_MAX:-2000}"
      OSIRIS_BRAIN_WS_HEARTBEAT_MS: "${OSIRIS_BRAIN_WS_HEARTBEAT_MS:-30000}"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:4500/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    mem_limit: "${OSIRIS_BRAIN_MEM_LIMIT:-512m}"
    cpus: "${OSIRIS_BRAIN_CPUS:-0.75}"
    pids_limit: 192
    networks:
      - backend
      - data
      - egress

  osiris-core-brain:
    <<: *node-runtime
    image: "${OSIRIS_CORE_BRAIN_IMAGE:-osiris-core-brain:latest}"
    build:
      context: ./services/core-brain
      dockerfile: Dockerfile
    depends_on:
      osiris-redis:
        condition: service_healthy
      osiris-event-bus:
        condition: service_healthy
    expose:
      - "4400"
    environment:
      NODE_ENV: "production"
      PORT: "4400"
      REDIS_URL: "redis://osiris-redis:6379"
      MODULE_INTELLIGENCE_ENABLED: "${MODULE_INTELLIGENCE_ENABLED:-true}"
      BRAIN_INPUT_STREAM: "${EVENT_STREAM_KEY:-osiris.stream}"
      BRAIN_OUTPUT_STREAM: "${BRAIN_OUTPUT_STREAM:-osiris.intelligence}"
      BRAIN_ALERT_STREAM: "${BRAIN_ALERT_STREAM:-osiris.intelligence.alerts}"
      BRAIN_INSIGHT_STREAM: "${BRAIN_INSIGHT_STREAM:-osiris.insights}"
      BRAIN_CONSUMER_GROUP: "${BRAIN_CONSUMER_GROUP:-osiris-core-brain}"
      BRAIN_CONSUMER_NAME: "${BRAIN_CONSUMER_NAME:-core-brain-1}"
      BRAIN_READ_COUNT: "${BRAIN_READ_COUNT:-100}"
      BRAIN_BLOCK_MS: "${BRAIN_BLOCK_MS:-5000}"
      BRAIN_MAX_RETRIES: "${BRAIN_MAX_RETRIES:-5}"
      BRAIN_BACKPRESSURE_MAX_PENDING: "${BRAIN_BACKPRESSURE_MAX_PENDING:-50000}"
      BRAIN_BACKPRESSURE_SLEEP_MS: "${BRAIN_BACKPRESSURE_SLEEP_MS:-500}"
      BRAIN_ALERT_MIN_SCORE: "${BRAIN_ALERT_MIN_SCORE:-70}"
      BRAIN_ALERT_MIN_RISK: "${BRAIN_ALERT_MIN_RISK:-60}"
      BRAIN_ALERT_MIN_CONFIDENCE: "${BRAIN_ALERT_MIN_CONFIDENCE:-55}"
      BRAIN_ENTITY_TTL_MS: "${BRAIN_ENTITY_TTL_MS:-1800000}"
      BRAIN_HAZARD_TTL_MS: "${BRAIN_HAZARD_TTL_MS:-21600000}"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:4400/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    mem_limit: "${CORE_BRAIN_MEM_LIMIT:-768m}"
    cpus: "${CORE_BRAIN_CPUS:-1.00}"
    pids_limit: 256
    networks:
      - backend
      - data

  osiris-agent:
    <<: *node-runtime
    image: "${OSIRIS_AGENT_IMAGE:-osiris-agent:latest}"
    build:
      context: ./services/osiris-agent
      dockerfile: Dockerfile
    depends_on:
      osiris-redis:
        condition: service_healthy
    expose:
      - "4600"
    environment:
      NODE_ENV: "production"
      PORT: "4600"
      REDIS_URL: "redis://osiris-redis:6379"
      SERVICE_NAME: "osiris-agent"
      OSIRIS_AGENT_ENABLED: "${OSIRIS_AGENT_ENABLED:-true}"
      OSIRIS_AGENT_INPUT_STREAM: "${EVENT_STREAM_KEY:-osiris.stream}"
      OSIRIS_AGENT_OUTPUT_STREAM: "${OSIRIS_AGENT_OUTPUT_STREAM:-osiris.insights}"
      OSIRIS_AGENT_DLQ_STREAM: "${OSIRIS_AGENT_DLQ_STREAM:-osiris.insights.dlq}"
      OSIRIS_AGENT_CONSUMER_GROUP: "${OSIRIS_AGENT_CONSUMER_GROUP:-osiris-agent}"
      OSIRIS_AGENT_CONSUMER_NAME: "${OSIRIS_AGENT_CONSUMER_NAME:-osiris-agent-1}"
      OSIRIS_AGENT_CONCURRENCY: "${OSIRIS_AGENT_CONCURRENCY:-8}"
      OSIRIS_AGENT_READ_COUNT: "${OSIRIS_AGENT_READ_COUNT:-100}"
      OSIRIS_AGENT_BLOCK_MS: "${OSIRIS_AGENT_BLOCK_MS:-5000}"
      OSIRIS_AGENT_MAX_RETRIES: "${OSIRIS_AGENT_MAX_RETRIES:-5}"
      OSIRIS_AGENT_MIN_INSIGHT_SCORE: "${OSIRIS_AGENT_MIN_INSIGHT_SCORE:-25}"
      OSIRIS_AGENT_ALERT_MIN_SCORE: "${OSIRIS_AGENT_ALERT_MIN_SCORE:-75}"
      OSIRIS_AGENT_BACKPRESSURE_MAX_PENDING: "${OSIRIS_AGENT_BACKPRESSURE_MAX_PENDING:-50000}"
      OSIRIS_AGENT_CORRELATION_RADIUS_KM: "${OSIRIS_AGENT_CORRELATION_RADIUS_KM:-120}"
      OSIRIS_AGENT_CORRELATION_WINDOW_MS: "${OSIRIS_AGENT_CORRELATION_WINDOW_MS:-3600000}"
      OSIRIS_AGENT_OLLAMA_ENABLED: "${OSIRIS_AGENT_OLLAMA_ENABLED:-false}"
      OLLAMA_URL: "${OLLAMA_URL:-http://ollama:11434}"
      OLLAMA_MODEL: "${OLLAMA_MODEL:-qwen2.5:7b-instruct}"
      OSIRIS_AGENT_OLLAMA_TIMEOUT_MS: "${OSIRIS_AGENT_OLLAMA_TIMEOUT_MS:-2500}"
      OSIRIS_AGENT_OLLAMA_MIN_SCORE: "${OSIRIS_AGENT_OLLAMA_MIN_SCORE:-55}"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:4600/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    mem_limit: "${OSIRIS_AGENT_MEM_LIMIT:-512m}"
    cpus: "${OSIRIS_AGENT_CPUS:-0.75}"
    pids_limit: 192
    networks:
      - backend
      - data
      - egress

  osiris-earthquakes:
    <<: *module-runtime
    expose:
      - "4103"
    environment:
      REDIS_URL: "redis://osiris-redis:6379"
      MODULE_ID: "earthquakes"
      MODULE_NAME: "Earthquake Feed"
      MODULE_KIND: "seismic"
      MODULE_PORT: "4103"
      MODULE_ENABLED: "${MODULE_EARTHQUAKES_ENABLED:-false}"
      MODULE_REFRESH_SECONDS: "${EARTHQUAKES_REFRESH_SECONDS:-60}"
      MODULE_PROBE_URL: "${EARTHQUAKES_PROBE_URL-http://osiris:3000/api/earthquakes}"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:4103/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  osiris-wildfires:
    <<: *module-runtime
    expose:
      - "4104"
    environment:
      REDIS_URL: "redis://osiris-redis:6379"
      MODULE_ID: "wildfires"
      MODULE_NAME: "Wildfire Feed"
      MODULE_KIND: "fire"
      MODULE_PORT: "4104"
      MODULE_ENABLED: "${MODULE_WILDFIRES_ENABLED:-false}"
      MODULE_REFRESH_SECONDS: "${WILDFIRES_REFRESH_SECONDS:-300}"
      MODULE_REQUIRED_ALL: "${WILDFIRES_REQUIRED_ALL-FIRMS_API_KEY}"
      MODULE_REQUIRED_POLICY: "degraded"
      MODULE_PROBE_URL: "${WILDFIRES_PROBE_URL-http://osiris:3000/api/fires}"
      FIRMS_API_KEY: "${FIRMS_API_KEY:-}"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:4104/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  osiris-satellites:
    <<: *module-runtime
    expose:
      - "4105"
    environment:
      REDIS_URL: "redis://osiris-redis:6379"
      MODULE_ID: "satellites"
      MODULE_NAME: "Satellite Tracking"
      MODULE_KIND: "space"
      MODULE_PORT: "4105"
      MODULE_ENABLED: "${MODULE_SATELLITES_ENABLED:-false}"
      MODULE_REFRESH_SECONDS: "${SATELLITES_REFRESH_SECONDS:-120}"
      MODULE_REQUIRED_ALL: "${SATELLITES_REQUIRED_ALL-N2YO_API_KEY}"
      MODULE_REQUIRED_POLICY: "degraded"
      MODULE_PROBE_URL: "${SATELLITES_PROBE_URL-http://osiris:3000/api/satellites}"
      N2YO_API_KEY: "${N2YO_API_KEY:-}"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:4105/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  osiris-shodan:
    <<: *module-runtime
    expose:
      - "4106"
    environment:
      REDIS_URL: "redis://osiris-redis:6379"
      MODULE_ID: "shodan"
      MODULE_NAME: "Shodan Enrichment"
      MODULE_KIND: "cyber"
      MODULE_PORT: "4106"
      MODULE_ENABLED: "${MODULE_SHODAN_ENABLED:-false}"
      MODULE_REFRESH_SECONDS: "${SHODAN_REFRESH_SECONDS:-300}"
      MODULE_REQUIRED_ALL: "${SHODAN_REQUIRED_ALL-SHODAN_API_KEY}"
      MODULE_REQUIRED_POLICY: "degraded"
      MODULE_PROBE_URL: "${SHODAN_PROBE_URL:-}"
      SHODAN_API_KEY: "${SHODAN_API_KEY:-}"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:4106/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  osiris-health:
    <<: *node-runtime
    image: "${OSIRIS_MODULE_IMAGE:-osiris-module-runtime:latest}"
    build:
      context: ./modules
      dockerfile: Dockerfile
    command: ["node", "health-monitor.js"]
    read_only: true
    depends_on:
      osiris-redis:
        condition: service_healthy
      osiris:
        condition: service_started
      osiris-intel:
        condition: service_started
      osiris-tracking:
        condition: service_started
      osiris-sensor-opensky:
        condition: service_started
      osiris-event-bus:
        condition: service_started
      osiris-brain:
        condition: service_started
      osiris-core-brain:
        condition: service_started
      osiris-agent:
        condition: service_started
      osiris-earthquakes:
        condition: service_started
      osiris-wildfires:
        condition: service_started
      osiris-satellites:
        condition: service_started
      osiris-shodan:
        condition: service_started
    expose:
      - "4190"
    environment:
      HEALTH_PORT: "4190"
      REDIS_URL: "redis://osiris-redis:6379"
      HEALTH_HTTP_TARGETS: >-
        osiris|http://osiris:3000/api/health;
        intelligence|http://osiris-intel:4000/health;
        tracking|http://osiris-tracking:4201/ready;
        tracking-sources|http://osiris-tracking:4201/sources|optional;
        opensky-sensor|http://osiris-sensor-opensky:4701/ready|optional;
        event-bus|http://osiris-event-bus:4300/ready;
        brain-bridge|http://osiris-brain:4500/ready|optional;
        core-brain|http://osiris-core-brain:4400/ready;
        ai-agent|http://osiris-agent:4600/ready|optional;
        earthquakes|http://osiris-earthquakes:4103/health|optional;
        wildfires|http://osiris-wildfires:4104/health|optional;
        satellites|http://osiris-satellites:4105/health|optional;
        shodan|http://osiris-shodan:4106/health|optional;
        module-verification|http://osiris:3000/api/modules/verify?strict=true&timeoutMs=1200&retries=0|optional;
        module-diagnosis|http://osiris:3000/api/modules/diagnose?strict=true&timeoutMs=1200&retries=0|optional
      HEALTH_TIMEOUT_MS: "${HEALTH_TIMEOUT_MS:-2500}"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:4190/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s
    mem_limit: "${HEALTH_MEM_LIMIT:-256m}"
    cpus: "${HEALTH_CPUS:-0.50}"
    pids_limit: 128
    networks:
      - backend
      - data

  osiris-redis:
    image: "${REDIS_IMAGE:-redis:7-alpine}"
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --save
      - "60"
      - "1000"
      - --maxmemory
      - "${REDIS_MAXMEMORY:-512mb}"
      - --maxmemory-policy
      - "${REDIS_MAXMEMORY_POLICY:-noeviction}"
    init: true
    restart: unless-stopped
    expose:
      - "6379"
    volumes:
      - type: volume
        source: redis-data
        target: /data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep -q PONG"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    mem_limit: "${REDIS_MEM_LIMIT:-768m}"
    cpus: "${REDIS_CPUS:-1.00}"
    pids_limit: 128
    networks:
      - data
    logging: *common-logging
    security_opt:
      - no-new-privileges:true

volumes:
  nginx-cache:
  next-cache:
  redis-data:

networks:
  edge:
    driver: bridge
  backend:
    driver: bridge
    internal: true
  data:
    driver: bridge
    internal: true
  egress:
    driver: bridge
