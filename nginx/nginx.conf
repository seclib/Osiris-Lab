worker_processes auto;

events {
    worker_connections 2048;
    multi_accept on;
}

http {
    server_tokens off;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65s;
    keepalive_requests 1000;

    log_format upstream_timing
        '$remote_addr - $remote_user [$time_local] "$request" $status $body_bytes_sent '
        '"$http_referer" "$http_user_agent" '
        'rt=$request_time uct=$upstream_connect_time uht=$upstream_header_time urt=$upstream_response_time '
        'cache=$upstream_cache_status req_id=$request_id';

    access_log /dev/stdout upstream_timing;
    error_log /dev/stderr warn;

    proxy_cache_path /var/cache/nginx/tiles
        levels=1:2
        keys_zone=tile_cache:100m
        max_size=10g
        inactive=365d
        use_temp_path=off;

    proxy_cache_path /var/cache/nginx/app
        levels=1:2
        keys_zone=app_cache:50m
        max_size=2g
        inactive=7d
        use_temp_path=off;

    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=tile_limit:10m rate=30r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # Docker DNS keeps scaled app containers discoverable and forwards public lookups.
    resolver 127.0.0.11 valid=30s ipv6=off;
    resolver_timeout 5s;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    server {
        listen 8080;
        limit_conn conn_limit 100;

        set $osiris_upstream http://osiris:3000;

        location = /healthz {
            access_log off;
            return 200 "ok\n";
        }

        location = /api/health {
            proxy_pass $osiris_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_connect_timeout 2s;
            proxy_send_timeout 10s;
            proxy_read_timeout 10s;
        }

        # Legacy direct tile cache path. Newer clients use /api/proxy-tiles.
        location ~ ^/proxy/tiles/(?<target_domain>(?:[a-d]\.)?basemaps\.cartocdn\.com)/(?<target_path>.*)$ {
            limit_req zone=tile_limit burst=200 nodelay;
            proxy_pass https://$target_domain/$target_path$is_args$args;
            proxy_set_header Host $target_domain;
            proxy_ssl_server_name on;
            proxy_ssl_protocols TLSv1.2 TLSv1.3;
            proxy_hide_header Set-Cookie;
            proxy_ignore_headers Set-Cookie;
            proxy_cache tile_cache;
            proxy_cache_key "$scheme://$target_domain/$target_path$is_args$args";
            proxy_cache_valid 200 304 365d;
            proxy_cache_valid any 1m;
            proxy_cache_lock on;
            proxy_connect_timeout 3s;
            proxy_send_timeout 20s;
            proxy_read_timeout 30s;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            add_header X-Cache-Status $upstream_cache_status always;
        }

        location ~ ^/proxy/tiles/ {
            return 403;
        }

        # Cache MapLibre tile proxy responses at the edge after the app allowlist check.
        location = /api/proxy-tiles {
            limit_req zone=tile_limit burst=200 nodelay;
            proxy_pass $osiris_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_hide_header Set-Cookie;
            proxy_ignore_headers Set-Cookie;
            proxy_cache tile_cache;
            proxy_cache_key "$arg_url";
            proxy_cache_valid 200 304 365d;
            proxy_cache_valid any 1m;
            proxy_cache_lock on;
            proxy_connect_timeout 3s;
            proxy_send_timeout 20s;
            proxy_read_timeout 30s;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            add_header X-Cache-Status $upstream_cache_status always;
        }

        location /_next/static/ {
            proxy_pass $osiris_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_cache app_cache;
            proxy_cache_valid 200 30d;
            proxy_cache_lock on;
            proxy_connect_timeout 3s;
            proxy_send_timeout 20s;
            proxy_read_timeout 30s;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            add_header X-Cache-Status $upstream_cache_status always;
        }

        location = /api/sdk/stream {
            limit_req zone=api_limit burst=30 nodelay;
            proxy_pass $osiris_upstream;
            proxy_http_version 1.1;
            proxy_buffering off;
            proxy_cache off;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_connect_timeout 3s;
            proxy_send_timeout 30s;
            proxy_read_timeout 1h;
        }

        location /api/ {
            limit_req zone=api_limit burst=120 nodelay;
            proxy_pass $osiris_upstream;
            proxy_http_version 1.1;
            proxy_cache off;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 2;
            proxy_connect_timeout 3s;
            proxy_send_timeout 30s;
            proxy_read_timeout 75s;
        }

        location / {
            proxy_pass $osiris_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 2;
            proxy_connect_timeout 3s;
            proxy_send_timeout 30s;
            proxy_read_timeout 75s;
        }
    }
}
