# =============================================================================
# OSIRIS — Nginx Production Configuration
# Reverse proxy + edge caching + TLS termination
# =============================================================================

worker_processes auto;
pid /var/run/nginx.pid;

events {
  worker_connections 65535;
  use epoll;
  multi_accept on;
}

http {
  # ─── Basic Settings ───────────────────────────────────────────────────────
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  keepalive_requests 100;
  types_hash_max_size 2048;
  server_tokens off;

  # ─── Logging ─────────────────────────────────────────────────────────────
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for" '
                  'rt=$request_time uct="$upstream_connect_time" '
                  'uht="$upstream_header_time" urt="$upstream_response_time"';

  access_log /var/log/nginx/access.log main buffer=32k flush=5s;
  error_log /var/log/nginx/error.log warn;

  # ─── Rate Limiting ────────────────────────────────────────────────────────
  limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
  limit_req_zone $binary_remote_addr zone=login:10m rate=1r/s;
  limit_conn_zone $binary_remote_addr zone=addr:10m;

  # ─── Cache Configuration ─────────────────────────────────────────────────
  proxy_cache_path /var/cache/nginx/tiles levels=1:2 keys_zone=tiles:10m max_size=15g inactive=7d use_temp_path=off;
  proxy_cache_path /var/cache/nginx/api levels=1:2 keys_zone=api_cache:10m max_size=1g inactive=1h use_temp_path=off;

  # ─── Upstreams ───────────────────────────────────────────────────────────
  upstream osiris_backend {
    server osiris:3000 max_fails=3 fail_timeout=30s;
    keepalive 32;
  }

  # ─── Server Block ────────────────────────────────────────────────────────
  server {
    listen 8080;
    server_name _;

    # ── Security Headers ──────────────────────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;

    # ── Client Settings ───────────────────────────────────────────────────
    client_max_body_size 1m;
    client_body_buffer_size 128k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 8k;

    # ── Health Check Endpoint ─────────────────────────────────────────────
    location /nginx-health {
      access_log off;
      return 200 "healthy\n";
      add_header Content-Type text/plain;
    }

    # ── Static Assets (long cache) ────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
      proxy_pass http://osiris_backend;
      proxy_cache tiles;
      proxy_cache_valid 200 7d;
      proxy_cache_valid 404 1m;
      proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
      add_header X-Cache-Status $upstream_cache_status;
      expires 7d;
      add_header Cache-Control "public, immutable";
    }

    # ── API Routes (short cache, rate limited) ─────────────────────────────
    location /api/ {
      limit_req zone=api burst=20 nodelay;
      limit_conn addr 10;

      proxy_pass http://osiris_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_connect_timeout 10s;
      proxy_send_timeout 30s;
      proxy_read_timeout 30s;

      # Cache GET requests
      proxy_cache api_cache;
      proxy_cache_valid 200 5m;
      proxy_cache_valid 404 1m;
      proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
      add_header X-Cache-Status $upstream_cache_status;
    }

    # ── Tile Server (long cache) ──────────────────────────────────────────
    location /tiles/ {
      proxy_pass http://osiris_backend;
      proxy_cache tiles;
      proxy_cache_valid 200 7d;
      proxy_cache_valid 404 1m;
      proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
      add_header X-Cache-Status $upstream_cache_status;
      expires 7d;
      add_header Cache-Control "public, immutable";
    }

    # ── WebSocket / SSE (no cache) ────────────────────────────────────────
    location /api/sdk/stream {
      proxy_pass http://osiris_backend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_connect_timeout 10s;
      proxy_send_timeout 3600s;
      proxy_read_timeout 3600s;
      proxy_buffering off;
    }

    # ── Default (frontend) ────────────────────────────────────────────────
    location / {
      proxy_pass http://osiris_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_connect_timeout 10s;
      proxy_send_timeout 30s;
      proxy_read_timeout 30s;
    }

    # ── Error Pages ───────────────────────────────────────────────────────
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
      root /usr/share/nginx/html;
      internal;
    }
  }
}