# =============================================================================
# OSIRIS — Redis Production Configuration
# Caching, rate limiting, session store
# =============================================================================

# ─── Network ────────────────────────────────────────────────────────────────
bind 0.0.0.0
protected-mode yes
port 6379
tcp-backlog 511
timeout 0

# ─── Memory Management ─────────────────────────────────────────────────────
maxmemory 256mb
maxmemory-policy allkeys-lru
maxmemory-samples 5

# ─── Persistence ───────────────────────────────────────────────────────────
save 60 1
save 300 100
save 3600 1000
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# ─── Replication ───────────────────────────────────────────────────────────
replica-serve-stale-data yes
replica-read-only yes

# ─── Security ─────────────────────────────────────────────────────────────
requirepass ${REDIS_PASSWORD}
rename-command CONFIG "CONFIG_disabled"
rename-command DEBUG "DEBUG_disabled"
rename-command FLUSHALL "FLUSHALL_disabled"
rename-command FLUSHDB "FLUSHDB_disabled"

# ─── Performance ──────────────────────────────────────────────────────────
tcp-keepalive 300
tcp-keepalive-intvl 60
tcp-keepalive-probes 3

# ─── Logging ──────────────────────────────────────────────────────────────
loglevel notice
logfile ""

# ─── Clients ──────────────────────────────────────────────────────────────
maxclients 1000

# ─── Memory Optimization ──────────────────────────────────────────────────
active-defrag yes
active-defrag-ignore-bytes 100mb
active-defrag-when-min 10%
active-defrag-cycle-min 5%
active-defrag-cycle-max 25%

# ─── Keyspace Notifications (optional) ────────────────────────────────────
notify-keyspace-events KEA